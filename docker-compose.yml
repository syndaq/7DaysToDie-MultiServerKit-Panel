services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: msk
      POSTGRES_PASSWORD: msk_dev_password
      POSTGRES_DB: multiserverkit
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
