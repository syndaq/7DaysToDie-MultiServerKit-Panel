services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msk_prod_password}
      POSTGRES_DB: ${POSTGRES_DB:-multiserverkit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-msk} -d ${POSTGRES_DB:-multiserverkit}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-msk}:${POSTGRES_PASSWORD:-msk_prod_password}@postgres:5432/${POSTGRES_DB:-multiserverkit}
      PORT: 3001
      HOST: 0.0.0.0
      WEB_ORIGIN: ${PANEL_URL:-http://localhost}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - '${PANEL_PORT:-80}:80'
    depends_on:
      - api

volumes:
  postgres_data:
